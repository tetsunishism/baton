<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>お問い合わせ | Baton</title>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --black: #1a1714;
      --white: #f5f4f0;
      --gray: #888;
      --border: #ddd;
    }
    body {
      background: var(--white);
      color: var(--black);
      font-family: 'Noto Sans JP', sans-serif;
      font-weight: 300;
      line-height: 1.8;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    header {
      padding: 24px 48px;
      border-bottom: 1px solid var(--border);
    }
    header a {
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      font-weight: 500;
      font-size: 18px;
      color: var(--black);
      text-decoration: none;
      letter-spacing: 0.08em;
    }
    .diagnosis-banner {
      background: #eef7ee;
      border: 1px solid #b6ddb6;
      padding: 12px 16px;
      font-size: 13px;
      color: #2d6e2d;
      line-height: 1.7;
      margin-bottom: 28px;
    }
    main {
      max-width: 640px;
      margin: 0 auto;
      padding: 64px 32px 96px;
      flex: 1;
      width: 100%;
    }
    .page-label {
      font-family: 'Noto Sans JP', sans-serif;
      font-size: 11px;
      letter-spacing: 0.15em;
      color: var(--gray);
      text-transform: uppercase;
      margin-bottom: 16px;
    }
    h1 {
      font-family: 'Noto Sans JP', sans-serif;
      font-size: 28px;
      font-weight: 600;
      letter-spacing: 0.04em;
      line-height: 1.5;
      margin-bottom: 12px;
    }
    .page-sub {
      font-size: 13px;
      color: var(--gray);
      margin-bottom: 48px;
      line-height: 1.8;
    }
    form {
      display: flex;
      flex-direction: column;
      gap: 28px;
    }
    .field {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    label {
      font-size: 12px;
      letter-spacing: 0.08em;
      color: #555;
    }
    label .req {
      color: #c0392b;
      margin-left: 4px;
    }
    input, textarea, select {
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 0;
      padding: 12px 16px;
      font-family: 'Noto Sans JP', sans-serif;
      font-size: 14px;
      font-weight: 300;
      color: var(--black);
      width: 100%;
      outline: none;
      transition: border-color 0.2s;
      -webkit-appearance: none;
    }
    input:focus, textarea:focus, select:focus {
      border-color: var(--black);
    }
    textarea {
      resize: vertical;
      min-height: 160px;
    }
    .submit-btn {
      background: var(--black);
      color: #fff;
      border: none;
      padding: 16px 40px;
      font-family: 'Noto Sans JP', sans-serif;
      font-size: 14px;
      font-weight: 300;
      letter-spacing: 0.08em;
      cursor: pointer;
      align-self: flex-start;
      transition: opacity 0.2s;
    }
    .submit-btn:hover { opacity: 0.75; }
    .submit-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .form-note {
      font-size: 11px;
      color: var(--gray);
      line-height: 1.8;
    }

    /* 送信完了 */
    .thanks {
      display: none;
      text-align: center;
      padding: 64px 0;
    }
    .thanks-check {
      font-size: 40px;
      margin-bottom: 24px;
    }
    .thanks h2 {
      font-family: 'Noto Sans JP', sans-serif;
      font-size: 22px;
      font-weight: 600;
      margin-bottom: 12px;
    }
    .thanks p {
      font-size: 14px;
      color: var(--gray);
      line-height: 1.9;
    }
    .thanks a {
      display: inline-block;
      margin-top: 32px;
      font-size: 13px;
      color: var(--black);
      text-decoration: underline;
      text-underline-offset: 4px;
    }

    @media (max-width: 600px) {
      header { padding: 20px 24px; }
      main { padding: 48px 24px 80px; }
      h1 { font-size: 22px; }
      .submit-btn { width: 100%; text-align: center; }
    }
    footer {
      border-top: 1px solid var(--border);
      padding: 24px 48px;
      font-size: 11px;
      color: var(--gray);
      font-family: 'Noto Sans JP', sans-serif;
    }
    @media (max-width: 600px) {
      footer { padding: 24px; }
    }
  </style>
</head>
<body>
  <header>
    <a href="/">Baton</a>
  </header>

  <main>
    <div class="page-label">Contact</div>
    <h1>お問い合わせ</h1>
    <p class="page-sub">
      診断・フォーム・LINEどの形からでも構いません。<br>
      まずは気軽にご連絡ください。
    </p>

    <div class="diagnosis-banner" id="diagnosis-banner" style="display:none">
      ✓ 診断結果がコピーされています。下の「お問い合わせ内容」欄に貼り付けてください。
    </div>

    <form id="contact-form" action="https://formspree.io/f/xaqdlnna" method="POST">
      <div class="field">
        <label>お名前<span class="req">*</span></label>
        <input type="text" name="name" required placeholder="山田 太郎">
      </div>
      <div class="field">
        <label>会社名・屋号</label>
        <input type="text" name="company" placeholder="株式会社〇〇（任意）">
      </div>
      <div class="field">
        <label>メールアドレス<span class="req">*</span></label>
        <input type="email" name="email" required placeholder="your@email.com">
      </div>
      <div class="field">
        <label>お問い合わせ種別<span class="req">*</span></label>
        <select name="type" required>
          <option value="" disabled selected>選択してください</option>
          <option value="本番化支援の相談">本番化支援の相談</option>
          <option value="料金・サービス内容の確認">料金・サービス内容の確認</option>
          <option value="その他">その他</option>
        </select>
      </div>
      <div class="field">
        <label>お問い合わせ内容<span class="req">*</span></label>
        <textarea name="message" required placeholder="作っているサービスの概要や、相談したい内容をご記入ください。"></textarea>
      </div>
      <p class="form-note">
        ※ 送信後、通常2営業日以内にご返信いたします。<br>
        ※ 個人情報の取り扱いについては<a href="/privacy" style="color:var(--gray)">プライバシーポリシー</a>をご確認ください。
      </p>
      <button type="submit" class="submit-btn" id="submit-btn">送信する →</button>
    </form>

    <div class="thanks" id="thanks">
      <div class="thanks-check">✓</div>
      <h2>送信が完了しました</h2>
      <p>お問い合わせありがとうございます。<br>通常2営業日以内にご返信いたします。</p>
      <a href="/">トップページへ戻る</a>
    </div>
  </main>

  <footer>
    © 2025 Baton. All rights reserved.
  </footer>

  <script>
    // 診断結果を sessionStorage から受け取る
    (function () {
      try {
        var diagnosis = sessionStorage.getItem('baton_diagnosis');
        if (diagnosis) {
          var banner = document.getElementById('diagnosis-banner');
          var textarea = document.querySelector('textarea[name="message"]');
          if (banner) banner.style.display = 'block';
          if (textarea) textarea.value = diagnosis;
          sessionStorage.removeItem('baton_diagnosis');
        }
      } catch (e) {}
    })();

    var form = document.getElementById('contact-form');
    var thanks = document.getElementById('thanks');
    var submitBtn = document.getElementById('submit-btn');

    form.addEventListener('submit', function (e) {
      e.preventDefault();
      submitBtn.disabled = true;
      submitBtn.textContent = '送信中...';

      fetch(form.action, {
        method: 'POST',
        body: new FormData(form),
        headers: { 'Accept': 'application/json' }
      }).then(function (res) {
        if (res.ok) {
          form.style.display = 'none';
          thanks.style.display = 'block';
        } else {
          submitBtn.disabled = false;
          submitBtn.textContent = '送信する →';
          alert('送信に失敗しました。時間をおいて再度お試しください。');
        }
      }).catch(function () {
        submitBtn.disabled = false;
        submitBtn.textContent = '送信する →';
        alert('送信に失敗しました。時間をおいて再度お試しください。');
      });
    });
  </script>
</body>
</html>
